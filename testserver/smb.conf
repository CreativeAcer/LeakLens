[global]
   workgroup = TESTLAB
   server string = LeakLens Test File Server
   netbios name = TESTSERVER
   security = user
   map to guest = Bad User
   guest account = nobody
   ntlm auth = yes
   smb ports = 445
   server min protocol = SMB2

[testshare]
   path = /shares/testshare
   browsable = yes
   writable = no
   guest ok = yes
   read only = yes
   force user = nobody
